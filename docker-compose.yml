services:
  postgres:
    image: postgres:16-alpine
    container_name: yt_transcripts_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: yt_user
      POSTGRES_PASSWORD: yt_password
      POSTGRES_DB: yt_transcripts
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yt_user -d yt_transcripts"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: yt_transcripts_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
